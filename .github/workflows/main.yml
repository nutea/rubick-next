name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build-win-x64:
    name: Build Windows x64 Installer
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure node-gyp Python
        shell: pwsh
        run: |
          "PYTHON=$env:pythonLocation\python.exe" >> $env:GITHUB_ENV
          "npm_config_python=$env:pythonLocation\python.exe" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check runtime dependencies
        run: pnpm check:runtime-deps

      - name: Validate release tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z]+)*$ ]]; then
            echo "Invalid release tag: $TAG"
            echo "Expected examples: v1.0.0, v1.2.3-beta.1"
            exit 1
          fi

      - name: Validate tag matches package version
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PKG_VERSION}"
          if [[ "$TAG" != "$EXPECTED_TAG" ]]; then
            echo "Tag does not match package.json version."
            echo "package.json version: ${PKG_VERSION}"
            echo "received tag: ${TAG}"
            echo "expected tag: ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Build Windows x64 installer
        run: pnpm electron:build:local

      - name: Smoke test packaged runtime
        run: pnpm check:packaged-runtime

      - name: Publish GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload installer artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rubick-win-x64-installer
          path: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
          if-no-files-found: error
