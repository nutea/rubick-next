productName: rubick
appId: com.muwoo.rubick
compression: maximum
directories:
  output: build
releaseInfo:
  releaseName: normal
  releaseNotesFile: ./release/releaseNotes.md
publish:
  - provider: github
    owner: rubickCenter
    repo: rubick
files:
  - dist/**/*
  - public/**/*
  - package.json
extraMetadata:
  main: dist/main/entry.js
dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
mac:
  icon: public/icons/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: rubick-${version}-${arch}.dmg
  gatekeeperAssess: false
  entitlementsInherit: ./release/entitlements.mac.plist
  entitlements: ./release/entitlements.mac.plist
  hardenedRuntime: true
  category: public.app-category.developer-tools
  extendInfo:
    LSUIElement: 1
win:
  icon: public/icons/icon.ico
  artifactName: rubick-Setup-${version}-${arch}.exe
  target:
    - target: nsis
      arch:
        - x64
        - ia32
nsis:
  shortcutName: rubick
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: public/installer.nsh
linux:
  icon: public/icons/
  publish:
    - github
  target: deb

