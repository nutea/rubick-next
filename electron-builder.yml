productName: rubick
appId: com.muwoo.rubick
compression: maximum
directories:
  output: build
releaseInfo:
  releaseName: normal
  releaseNotesFile: ./release/releaseNotes.md
files:
  - dist/**/*
  - public/**/*
  - package.json
  - node_modules/{ajv,bluebird,buffer-equal,deferred-leveldown,delayed-stream,dom-walk,event-target-shim,fast-deep-equal,fast-json-stable-stringify,file-uri-to-path,global,har-schema,is-function,json-schema-traverse,jsonfile,level-iterator-stream,mime,mime-db,min-document,napi-macros,parse-bmfont-ascii,parse-bmfont-binary,parse-bmfont-xml,parse-headers,performance-now,pouchdb-collections,querystringify,requires-port,uri-js,xhr,xml-parse-from-string,xml2js}/**/*
  - node_modules/.pnpm/*/node_modules/request-promise-core/**/*
  - node_modules/.pnpm/*/node_modules/stealthy-require/**/*
extraMetadata:
  main: dist/main/entry.js
win:
  icon: public/icons/icon.ico
  artifactName: rubick-Setup-${version}-x64.exe
  target:
    - target: nsis
      arch:
        - x64
nsis:
  shortcutName: rubick
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: public/installer.nsh
  warningsAsErrors: false
