productName: rubick
appId: com.muwoo.rubick
compression: maximum
directories:
  output: build
releaseInfo:
  releaseName: normal
  releaseNotesFile: ./release/releaseNotes.md
files:
  - dist/**/*
  - public/**/*
  - package.json
  - "!**/*.{md,ts,map,d.ts,tsbuildinfo,flow,nycrc}"
  - "!**/{__tests__,test,tests,example,examples,powered-test,docs}/**"
  - "!**/node_modules/rubick-native-next/native/{src,target,build.rs,Cargo.lock,Cargo.toml}"
  - "!**/node_modules/rubick-native-next/native/target/**"
asarUnpack:
  - "**/*.node"
  - node_modules/better-sqlite3/**/*
  - node_modules/rubick-native-next/native/rubick_native_next.node
  - node_modules/rubick-native-next/index.js
  - node_modules/rubick-native-next/package.json
extraMetadata:
  main: dist/main/entry.js
win:
  icon: public/icons/icon.ico
  artifactName: rubick-Setup-${version}-x64.exe
  target:
    - target: nsis
      arch:
        - x64
nsis:
  shortcutName: rubick
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: public/installer.nsh
  warningsAsErrors: false
